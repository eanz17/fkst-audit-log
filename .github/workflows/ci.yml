name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out audit pipeline
        uses: actions/checkout@v4
        with:
          path: fkst-audit-log

      - name: Check out fkst engine
        uses: actions/checkout@v4
        with:
          repository: ChronoAIProject/fkst-substrate
          ref: dev
          path: fkst-substrate

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: fkst-audit-log/web/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install CI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes ripgrep

      - name: Build fkst framework
        run: cargo build --manifest-path fkst-substrate/Cargo.toml -p fkst-framework

      - name: Install web dependencies
        run: npm --prefix fkst-audit-log/web ci

      - name: Run repository checks
        working-directory: fkst-audit-log
        env:
          BIN: ${{ github.workspace }}/fkst-substrate/target/debug/fkst-framework
          FKST_PYTHON: python3
        run: scripts/check.sh
